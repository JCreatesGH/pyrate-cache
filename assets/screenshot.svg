<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="SFMono-Regular,Consolas,Menlo,monospace">
  <rect width="760" height="430" rx="10" fill="#1e1e2e"/>
  <rect width="760" height="34" rx="10" fill="#313244"/>
  <rect y="20" width="760" height="14" fill="#313244"/>
  <circle cx="20" cy="17" r="6" fill="#f38ba8"/><circle cx="40" cy="17" r="6" fill="#f9e2af"/><circle cx="60" cy="17" r="6" fill="#a6e3a1"/>
  <text x="380" y="22" fill="#bac2de" font-size="12" text-anchor="middle">pyrate-cache — example.py</text>
  <text font-size="14" xml:space="preserve">
    <tspan x="22" y="68" fill="#cba6f7">from</tspan><tspan fill="#cdd6f4"> pyrate_cache </tspan><tspan fill="#cba6f7">import</tspan><tspan fill="#cdd6f4"> cache, rate_limit</tspan>
    <tspan x="22" y="104" fill="#89dceb">@cache</tspan><tspan fill="#cdd6f4">(ttl=</tspan><tspan fill="#fab387">60</tspan><tspan fill="#cdd6f4">)</tspan>
    <tspan x="22" y="124" fill="#89dceb">@rate_limit</tspan><tspan fill="#cdd6f4">(calls=</tspan><tspan fill="#fab387">5</tspan><tspan fill="#cdd6f4">, period=</tspan><tspan fill="#fab387">1.0</tspan><tspan fill="#cdd6f4">)</tspan>
    <tspan x="22" y="144" fill="#cba6f7">def</tspan><tspan fill="#89b4fa"> fetch_price</tspan><tspan fill="#cdd6f4">(symbol):</tspan>
    <tspan x="42" y="164" fill="#cdd6f4">return api.get(symbol)   </tspan><tspan fill="#6c7086"># cached + throttled</tspan>
  </text>
  <rect x="22" y="190" width="716" height="1" fill="#45475a"/>
  <text font-size="13.5" xml:space="preserve">
    <tspan x="22" y="220" fill="#a6e3a1">$ </tspan><tspan fill="#cdd6f4">python -m pytest -q</tspan>
    <tspan x="22" y="244" fill="#a6e3a1">..........                                          [100%]</tspan>
    <tspan x="22" y="268" fill="#a6e3a1">10 passed in 0.15s</tspan>
    <tspan x="22" y="300" fill="#a6e3a1">$ </tspan><tspan fill="#cdd6f4">fetch_price.hits, fetch_price.misses</tspan>
    <tspan x="22" y="324" fill="#f9e2af">(8, 2)</tspan>
    <tspan x="22" y="356" fill="#cdd6f4">TokenBucket: 5 calls/sec, blocks then refills automatically</tspan>
    <tspan x="22" y="388" fill="#6c7086"># zero dependencies · thread-safe · pluggable backends</tspan>
  </text>
</svg>
